[check]

file-extensions= ["f90", "F90", "X90", "x90"]       #check these file types


select = ["E000", "E001", "C001", "C021", "C022", "C031", "C032", "C043",
"C051", "C071", "C072", "C081", "C091", "C082", "C092", "C121",
"C132", "C141", "OB011", "OB021", "OB051", "OB061", "MOD001", "MOD021",
"S101", "S071", "PORT011", "PORT012", "PORT021", "FORT001",
"FORT002", "FORT003", "FORT004", "FORT005"]

output-format = "full"              #group results by file


# List of what the rules used are checking for:
# E000 io-error, E001 syntax-error, C001 missing implicit none,
# C021 real literal missing kind suffix,
# C022 implicit-real-kind, C031 magic-number-in-array-size,
# C032 magic unit in IO statement, C043 missing-action-specifier,
# C051 trailing-backslash, C071 assumed-size,
# C072 character has assumed size but does not have intent(in),
# C081 initialisation-in-declaration, C091 external-procedure,
# C082 pointer-initialisation-in-declaration, C092 procedure-not-in-module,
# C121 use-all, C132 default-public-accessibility,
# C141 missing-exit-or-cycle-label, OB011 common-block, OB021 entry-statement,
# OB051 pause-statement, OB061 deprecated-character-syntax,
# MOD001 double-precision, MOD021 deprecated-relational-operator,
# S101 trailing-whitespace, S071 missing-double-colon,
# PORT011 literal-kind, PORT012 literal-kind-suffix,
# PORT021 star-kind, FORT001 invalid-rule-code-or-name,
# FORT002 unused-allow-comment, FORT003 redirected-allow-comment,
# FORT004 duplicated-allow-comment, FORT005 disabled-allow-comment

# Repos containing only a few files with errors for the above rules
# are dealt with below:

[check.per-file-ignores] #don't run these rules on these files:

# infrastructure/source:
"constants_mod.F90" = ["MOD001", "C022"]
"lfric_mpi_mod.F90" = ["E001"]
"random_number_generator_mod.f90" = ["C022"]

# components/science:
"sci_psykal_builtin_light_mod.f90" = ["C132"]

